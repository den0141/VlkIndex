<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Авторизация</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { font-family: -apple-system,BlinkMacSystemFont,sans-serif; text-align:center; padding:20px; background:#f0f0f0; }
.loader { border:4px solid #ddd; border-radius:50%; border-top:4px solid #4a76a8; width:40px; height:40px; margin:40px auto; animation:spin 0.8s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<h2>Авторизация…</h2>
<div class="loader"></div>
<script>
window.onload = function(){
    const initData = Telegram.WebApp.initData;
    fetch("https://game-auth-bot.onrender.com", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({initData})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.ok) document.body.innerHTML="<h2>Успешный вход!</h2>";
        else document.body.innerHTML="<h2>Ошибка: "+data.error+"</h2>";
    });
};
</script>
</body>
</html>м
