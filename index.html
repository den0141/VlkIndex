<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в игру</title>
<style>
  body { font-family: Arial; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:#f0f0f0; }
  button { font-size:16px; padding:10px 20px; margin:10px; }
</style>
</head>
<body>

<h2>Вход в игру</h2>
<button id="sendData">Войти</button>

<script>
const sendBtn = document.getElementById("sendData");

sendBtn.onclick = () => {
    // Отправляем данные обратно боту
    window.Telegram.WebApp.sendData("initData автоматически");
    alert("Данные отправлены боту. Закройте WebApp и вернитесь в Telegram.");
};
</script>

</body>
</html>
