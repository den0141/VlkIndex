<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Game WebApp</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px; }
    .screen { display:none; }
    #auth { display:block; }
    button {
        padding:15px;
        width:100%;
        margin-top:20px;
        background:#6C63FF;
        color:#fff;
        border:none;
        border-radius:10px;
        font-size:18px;
    }
    .card {
        padding:15px;
        background:#222;
        border-radius:10px;
        margin-top:10px;
    }
</style>
</head>
<body>

<!-- ====================== AUTH ======================== -->
<div id="auth" class="screen">
    <h2>Введите initData</h2>
    <textarea id="initData" style="width:100%;height:120px;"></textarea>
    <button onclick="sendInit()">Войти</button>
</div>

<!-- ====================== PROFILE ====================== -->
<div id="profile" class="screen">
    <h2>Профиль игрока</h2>

    <div class="card">
        <b>ID:</b> <span id="p_id"></span><br>
        <b>Balance (₽):</b> <span id="p_money"></span><br>
        <b>Сигареты:</b> <span id="p_cigs"></span><br>
    </div>

</div>

<script>
const tg = Telegram.WebApp;
tg.expand();


async function sendInit() {
    const init = document.getElementById("initData").value.trim();

    if (!init.startsWith("query_id=")) {
        alert("Неверный initData");
        return;
    }

    // отправляем на backend
    const resp = await fetch("https://game-auth-bot.onrender.com/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ initData: init })
    });

    const data = await resp.json();

    if (data.error) {
        alert("Ошибка: " + data.error);
        return;
    }

    // УСПЕШНО → открываем профиль
    document.getElementById("auth").style.display = "none";
    document.getElementById("profile").style.display = "block";

    document.getElementById("p_id").innerText = data.playerId;
    document.getElementById("p_money").innerText = data.money;
    document.getElementById("p_cigs").innerText = data.cigs;

    tg.sendData(init); // отправляем назад боту (если нужно)
}
</script>

</body>
</html>
