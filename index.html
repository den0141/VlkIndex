<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в игру</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { font-family: Arial; background: #212121; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
button { padding: 10px 20px; font-size: 18px; background: #8774e1; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
#profile { margin-top: 20px; }
</style>
</head>
<body>

<h1>Вход в игру</h1>
<button id="loginBtn">Войти</button>

<div id="profile"></div>

<script>
const tg = window.Telegram.WebApp;

// Нажатие кнопки
document.getElementById("loginBtn").addEventListener("click", async () => {
    try {
        // Получаем данные WebApp (query_id, user и т.д.)
        const data = tg.initData || tg.initDataUnsafe;
        if(!data) throw new Error("Нет данных WebApp");

        // Отправляем на наш backend
        const res = await fetch("https://game-auth-bot.onrender.com/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tgData: data })
        });
        const profile = await res.json();

        if(profile.success){
            document.getElementById("profile").innerHTML = `
                <h2>${profile.nickname}</h2>
                <p>Rubles: ${profile.currencies.rubles}</p>
                <p>Soap: ${profile.currencies.soap}</p>
            `;
        } else {
            document.getElementById("profile").innerText = "Ошибка получения профиля";
        }
    } catch(e){
        document.getElementById("profile").innerText = "Ошибка авторизации";
        console.error(e);
    }
});
</script>

</body>
</html>
