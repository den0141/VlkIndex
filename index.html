<input type="text" id="tokenInput" placeholder="Вставьте свой токен">
<button id="loginBtn">Войти</button>
<p id="status"></p>

<script>
document.getElementById("loginBtn").addEventListener("click", async () => {
    const token = document.getElementById("tokenInput").value.trim();
    if (!token) {
        document.getElementById("status").innerText = "Введите токен!";
        return;
    }

    document.getElementById("status").innerText = "Получаем профиль...";

    try {
        const res = await fetch("https://your-backend.onrender.com/api/player", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
        });
        const data = await res.json();

        if (data.error) {
            document.getElementById("status").innerText = "Ошибка: " + data.error;
            return;
        }

        document.getElementById("status").innerHTML =
            `Привет, <b>${data.nickname}</b>!<br>Валюта: ${data.currencies.rubles} руб.`;
    } catch (e) {
        console.error(e);
        document.getElementById("status").innerText = "Ошибка получения профиля";
    }
});
</script>
