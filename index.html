<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход в игру</title>
<style>
body { background:#212121; color:white; font-family:sans-serif; text-align:center; padding-top:50px; }
input { padding:10px; width:80%; margin:10px 0; border-radius:5px; border:none; }
button { padding:10px 20px; background:#8774e1; color:white; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>
<body>

<h2>Вход в игру</h2>
<input type="text" id="tokenInput" placeholder="Вставьте токен игры">
<br>
<button id="loginBtn">Войти</button>
<p id="status"></p>

<script>
document.getElementById("loginBtn").addEventListener("click", async () => {
    const token = document.getElementById("tokenInput").value.trim();
    if (!token) return alert("Введите токен!");

    try {
        const res = await fetch("https://game-auth-bot.onrender.com/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
        });
        const data = await res.json();

        if (data.error) {
            document.getElementById("status").innerText = "Ошибка: " + data.error;
            return;
        }

        document.getElementById("status").innerHTML =
            `Привет, ${data.nickname}!<br>
             Валюта: ${data.currencies.rubles} руб., ${data.currencies.soap} мыло,<br>
             Уровень: ${data.level}`;
    } catch (e) {
        document.getElementById("status").innerText = "Ошибка получения профиля";
    }
});
</script>

</body>
</html>
