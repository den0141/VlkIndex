<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <title>Auth Loading...</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            text-align: center;
        }
        .box {
            margin-top: 40%;
            font-size: 20px;
        }
        .loader {
            border: 4px solid #ddd;
            border-radius: 50%;
            border-top: 4px solid #4a76a8;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader"></div>
        Авторизация…
    </div>

    <script>
        window.onload = function() {
            const initData = Telegram.WebApp.initData;

            fetch("https://YOUR_BACKEND.onrender.com/api/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ initData })
            })
            .then(res => res.json())
            .then(result => {
                if (result.ok) {
                    document.body.innerHTML = "<h2>Успешный вход!</h2>";
                } else {
                    document.body.innerHTML = "<h2>Ошибка: " + result.error + "</h2>";
                }
            });
        };
    </script>
</body>
</html>
