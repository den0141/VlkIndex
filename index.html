<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPrisonBot — Авторизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color);
            font-size: 14px;
        }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
    </style>
</head>
<body>

<h2>Авторизация в игре</h2>
<p>Вставьте сюда <b>полный initData</b> из Network → login → Payload</p>

<textarea id="initData" placeholder="query_id=AAA...&user=%7B...&auth_date=...&hash=..."></textarea>

<button onclick="sendData()">Отправить</button>

<script>
    function sendData() {
        const data = document.getElementById("initData").value.trim();

        if (!data.includes("query_id=") || !data.includes("hash=")) {
            alert("Ошибка: вставьте полный initData, начиная с query_id= ... и заканчивая hash= ...");
            return;
        }

        Telegram.WebApp.sendData(data);
        Telegram.WebApp.close();
    }

    Telegram.WebApp.expand();
</script>

</body>
</html>
