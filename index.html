<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Игровой профиль</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body style="font-family: sans-serif; background:#111; color:white;">
  <h2>Ваш профиль</h2>

  <div id="profile">Загрузка...</div>

  <script>
    const tg = Telegram.WebApp;
    tg.expand();

    // initData — телеграмовская подпись
    const initData = tg.initData;

    // Запрос на Python-бэкенд
    fetch("https://your-domain.com/api/profile", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ initData: initData })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("profile").innerHTML = `
          <b>Уровень:</b> ${data.level}<br>
          <b>Опыт:</b> ${data.experience} / ${data.nextLevelExperience}<br><br>
          
          <b>Валюта:</b><br>
          Cash: ${data.currencies.Cash}<br>
          Gold: ${data.currencies.Gold}<br>
          Prison: ${data.currencies.PrisonCurrency}<br><br>

          <b>Энергия:</b> ${data.energy} / ${data.maxEnergy}<br>
        `;
    });
  </script>
</body>
</html>
