<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизация в игре</title>
<style>
  body { font-family: Arial; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:#f0f0f0; }
  input, button, textarea { font-size:16px; padding:8px; margin:5px; width:90%; max-width:500px; }
  #status { margin-top:10px; color:green; }
</style>
</head>
<body>

<h2>Авторизация в игре</h2>
<textarea id="initData" placeholder="Вставьте всю строку initData из Telegram" rows="4"></textarea>
<button id="loginBtn">Войти</button>
<div id="status"></div>

<script>
const BACKEND_URL = "https://game-auth-bot.onrender.com/api/login";

document.getElementById("loginBtn").onclick = async () => {
  const initData = document.getElementById("initData").value.trim();
  if (!initData) { alert("Вставьте вашу строку initData из Telegram"); return; }

  document.getElementById("status").textContent = "Авторизация...";

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById("status").textContent = "Авторизация успешна!";
      // Пример: показываем валюту пользователя
      if(data.currencies){
        document.getElementById("status").textContent +=
          ` | Рубли: ${data.currencies.rubles}, Сигареты: ${data.currencies.cigarettes}, Сахар: ${data.currencies.sugar}`;
      }
    } else {
      document.getElementById("status").textContent = "Ошибка авторизации!";
      console.error(data);
    }
  } catch (err) {
    document.getElementById("status").textContent = "Ошибка соединения!";
    console.error(err);
  }
};
</script>

</body>
</html>
