<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизация в игре</title>
<style>
  body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f0f0; }
  #status { font-size: 18px; color: #333; }
</style>
</head>
<body>
<div id="status">Авторизация...</div>

<script>
const tg = window.Telegram.WebApp;
const initData = tg.initData; // данные Telegram

const BACKEND_URL = "https://game-auth-bot.onrender.com/api/login"; // твой backend

async function authorize() {
  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById("status").textContent = "Авторизация успешна!";
    } else {
      document.getElementById("status").textContent = "Ошибка авторизации!";
      console.error(data);
    }
  } catch (err) {
    document.getElementById("status").textContent = "Ошибка соединения!";
    console.error(err);
  }
}

authorize();
</script>
</body>
</html>
